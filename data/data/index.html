<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="stylesheet" type="text/css" href="stylesheet.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonnenlicht Immitierer</title>
</head>

<body>
    <h1>Sonnenlicht Immitierer</h1>
    <h2>Relay Kontrollen</h2>
    <div class="relay-switches-container">
        <!-- Relay 1 Time Control -->
        <div class="relay-card">
            <h2>Relay 1</h2>
            <div class="relay-time-input-container">
                <div class="relay-time-input">
                    <div class="time-group">
                        <div>
                            <h3>Start</h3>
                        </div>
                        <div>
                            <input type="number" min="0" max="23" class="relay-time-hours" id="relay1StartHours"
                                placeholder="HH" onkeyup="validateInputMinMax(this)">
                            <span>:</span>
                            <input type="number" min="0" max="59" class="relay-time-minutes" id="relay1StartMinutes"
                                placeholder="MM" onkeyup="validateInputMinMax(this)">
                        </div>
                    </div>
                    <div class="time-group">
                        <div>
                            <h3>Ende</h3>
                        </div>
                        <div>
                            <input type="number" min="0" max="23" class="relay-time-hours" id="relay1EndHours"
                                placeholder="HH" onkeyup="validateInputMinMax(this)">
                            <span>:</span>
                            <input type="number" min="0" max="59" class="relay-time-minutes" id="relay1EndMinutes"
                                placeholder="MM" onkeyup="validateInputMinMax(this)">
                        </div>
                    </div>
                </div>
                <button class="confirm-btn" id="relay1TimeConfirm">Confirm</button>
            </div>
            <label class="switch">
                <input type="checkbox" class="slider-toggle" id="relay1TimeSwitch">
                <span class="slider"></span>
            </label>
            <div id="relay1Schedule">
                <p>Scheduled Time: <span id="relay1TimeDisplay">Not Set</span></p>
                <p>Status: <span id="relay1StatusDisplay">Off</span></p>
            </div>
        </div>
